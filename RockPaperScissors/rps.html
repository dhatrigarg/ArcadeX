<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="rpsStyles.css">
</head>
<body>
    <h3>Rock Paper Scissors</h3>
    <div class="features">
        <div class="featureBox" id="rock" >
            <img src="rock.png" class="feature-image"> 
        </div>
        <div class="featureBox" >
            <img src="paper.png" class="feature-image "> 
        </div>
        <div class="featureBox" >
            <img src="scissors.png" class="feature-image"> 
        </div>
    </div>
    <div class="score">
        <div>
            <p class="scoreNum">0</p>
            <p class="belowHeading">YOU</p>
        </div>
        <div>
            <p class="scoreNum">0</p>
            <p class="belowHeading">BOT</p>
        </div>
    </div>
    <div class="result">
        <button>Make Your Move!</button>
    </div>
</body>
</html>
