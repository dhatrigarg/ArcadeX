<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="rpsStyles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../images/logo.png" alt="ArcadeX Logo">
        </div>
        <div class="nav-links">
            <a href="../index.html">Back to Home</a>
        </div>
    </nav>
    <h3> 
        <span class="first">ROCK</span>
        <span class="second">PAPER</span>
        <span class="third">SCISSORS</span>
    </h3>
    <p class="features-sub" id="features-sub-one">The classic game. Endless fun.</p>
    <p class="features-sub" id="features-sub-two">Choose your move and beat the computer.</p>
    
    <section class="container">
        <div class="box left">
            <div class="sideHeading">
                <span><i class="fa-solid fa-question" style="color:#A855F7;"></i></span><span>  HOW TO PLAY</span>
            </div>
            <div class="points">
                <p>✊<span class="first"> Rock</span> crushes <span class="third"> Scissors</span></p>
                <p>🖐️<span class="second"> Paper</span> covers <span class="first"> Rock</span></p>
                <p>✌️<span class="third"> Scissors</span> cuts <span class="second"> Paper</span></p>
            </div>
        </div>
        <div class="box center">
            <h3 class="grad-text" id="featuresMain">Make your move</h3>
            <div class="rpsAll">
                <div class="rpsBox">
                    <img src="rock.png" alt="Rock" id="rock" class="rps-image">
                    <h4 class="first">Rock</h4>
                </div>
                <div class="rpsBox">
                    <img src="paper.png" alt="Paper" id="paper" class="rps-image">
                    <h4 class="second">Paper</h4>
                </div>
                <div class="rpsBox">
                    <img src="scissors.png" alt="Scissors" id="scissors" class="rps-image">
                    <h4 class="third">Scissors</h4>
                </div>
            </div>
            <button class="btn">Let's Play</button>
        </div>
        <div class="box right">
            <div class="sideHeading">
                <span><i class="fa-solid fa-trophy" style="color:#A855F7;"></i></span><span>  YOUR SCORE</span>
            </div>
            <div class="points" id="rightPoints">
                <p>🎊  Wins : <span id="playerScore" class="first"> 0</span></p>
                <p>💀  Losses : <span id="computerScore" class="second"> 0</span></p>
                <p>📊  Win Rate : <span class="third"> <span id="winRate"> 0</span>%</span></p>
            </div>
        </div>

    </section>

    <script src="rpsScript.js"></script>
</body>
</html>
