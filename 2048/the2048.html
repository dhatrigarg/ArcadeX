<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tile Rush 2048</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../RockPaperScissors/rpsStyles.css">
    <link rel="stylesheet" href="the2048.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../images/logo.png" alt="ArcadeX Logo">
        </div>
        <div class="nav-links">
            <a href="../index.html">Back to Home</a>
        </div>
    </nav>
    <h3><span class="first">TILE</span>
        <span class="second">RUSH</span>
        <span class="third">2048</span></h3>
    
        
        <p class="features-sub" id="features-sub-one">Numbers collide and grow</p>
        <p class="features-sub" id="features-sub-two">Aim for 2048 glory</p>
        
        <section class="container">
            <div class="box left">
            <div class="sideHeading">
                <span><i class="fa-solid fa-question" style="color:#A855F7;"></i></span><span>  HOW TO PLAY</span>
            </div>
            <div class="points">
                <p>➡️ Swipe to move tiles</p>
                <p>🔢 Merge same numbers to grow</p>
                <p>🎯 Reach the 2048 tile to win</p>
            </div>
        </div>
        <div class="box center">
            <h3 class="grad-text" id="featuresMain">Play the game</h3> 
            <div class="grid">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <button class="btn">Reset Game</button>
        </div>
        <div class="box right">
            <div class="sideHeading">
                <span><i class="fa-solid fa-trophy" style="color:#A855F7;"></i></span><span>  YOUR SCORE</span>
            </div>
            <div class="points" id="rightPoints">
                <p>🌟  Score : <span id="player1Score" class="first"> 0</span></p>
                <p>👣  Moves : <span id="player2Score" class="second"> 0</span></p>
                <p>🔢  Max Tile : <span id="drawScore" class="third"> 0</span></p>
            </div>
        </div>
    </section>

    <script src="the2048.js"></script>
</div>
</body>
</html>
